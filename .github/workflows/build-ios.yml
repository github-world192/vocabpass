name: Build iOS (Unsigned)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (Unsigned)
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          cd build/ios/Release-iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r -q app-unsigned.ipa Payload
          mv app-unsigned.ipa ../../../

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned-ios
          path: app-unsigned.ipa
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: app-unsigned.ipa
